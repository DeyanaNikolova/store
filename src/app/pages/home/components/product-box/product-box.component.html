<mat-card
  [ngClass]="{ 'text-center': !fullWidthMode, 'text-left': fullWidthMode }"
>
  <div [ngClass]="{ 'flex': fullWidthMode, 'block': !fullWidthMode }">
    <img
      class="image"
      [ngClass]="{ 'h-200px': !fullWidthMode, 'h-[360px]': fullWidthMode }"
      src="https://images.unsplash.com/photo-1719090024435-d0e527968e55?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwyNHx8fGVufDB8fHx8fA%3D%3D"
    />
    <div
      [ngClass]="{
        'card-details': !fullWidthMode,
        'card-details-full': fullWidthMode
      }"
    >
      <div>
        <h5>Shoes</h5>
        <p class="details">Snickers</p>
        <p *ngIf="fullWidthMode">Description</p>
      </div>
      <div class="card-action">
        <span>{{ "150" | currency }}</span>
        <button>
          <mat-icon class="btn">shopping_cart</mat-icon>
        </button>
      </div>
    </div>
  </div>
</mat-card>
